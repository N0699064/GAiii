<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    <filter id="glossy" x="0%" y="0%" width="100%" height="100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feSpecularLighting surfaceScale="5" specularConstant="1" specularExponent="10" lighting-color="white">
        <fePointLight x="50" y="20" z="50"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  <!-- Voice bars -->
  <rect x="8" y="20" width="6" height="24" fill="url(#goldGradient)" filter="url(#glossy)" rx="2"/>
  <rect x="16" y="15" width="6" height="34" fill="url(#goldGradient)" filter="url(#glossy)" rx="2"/>
  <rect x="24" y="10" width="6" height="44" fill="url(#goldGradient)" filter="url(#glossy)" rx="2"/>
  <rect x="32" y="8" width="6" height="48" fill="url(#goldGradient)" filter="url(#glossy)" rx="2"/>
  <rect x="40" y="12" width="6" height="40" fill="url(#goldGradient)" filter="url(#glossy)" rx="2"/>
  <rect x="48" y="18" width="6" height="28" fill="url(#goldGradient)" filter="url(#glossy)" rx="2"/>
</svg>